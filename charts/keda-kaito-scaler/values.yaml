log:
  level: 5

replicaCount: 1
certDuration: 43800h
nameOverrider: ""

image:
    registry: ghcr.io
    repository: kaito-project/keda-kaito-scaler
    tag: 0.6.1
    pullSecrets: []

ports:
  grpc: 10450
  metrics: 10451
  grpcHealth: 10452

resources:
  limits:
    cpu: 2000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Additional tolerations applied to the scaler pod, appended to the
# always-present control-plane tolerations. Empty by default; the caller is
# expected to pass any required tolerations (e.g. a CriticalAddonsOnly
# toleration for nodes reserved for critical add-ons).
tolerations: []
  